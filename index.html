<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GGomi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { -webkit-tap-highlight-color: transparent; font-family: sans-serif; }</style>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-5xl font-black text-indigo-600 tracking-tighter">GGomi</h1>
            <button onclick="document.getElementById('modal').style.display='block'" class="bg-indigo-600 text-white w-16 h-16 rounded-full text-4xl shadow-xl active:scale-90 transition-transform">+</button>
        </header>
        <div id="list" class="space-y-4">
            <p class="text-center text-gray-400 py-20 text-xl">데이터를 연결하는 중...</p>
        </div>
    </div>

    <div id="modal" style="display:none;" class="fixed inset-0 bg-white z-50 p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-bold">내역 추가</h2>
            <button onclick="document.getElementById('modal').style.display='none'" class="text-5xl text-gray-300">&times;</button>
        </div>
        <div class="space-y-8">
            <input type="date" id="inDate" class="w-full border-b-4 border-gray-100 p-4 text-2xl outline-none focus:border-indigo-600 transition-colors">
            <select id="inCat" class="w-full border-b-4 border-gray-100 p-4 text-2xl outline-none"></select>
            <input type="text" id="inItem" placeholder="어디에 쓰셨나요?" class="w-full border-b-4 border-gray-100 p-4 text-2xl outline-none">
            <input type="number" id="inAmount" placeholder="금액 입력" class="w-full border-b-4 border-gray-100 p-4 text-2xl outline-none">
            <button onclick="save()" id="sBtn" class="w-full bg-indigo-600 text-white p-6 rounded-3xl text-2xl font-bold shadow-2xl active:scale-95 transition-all">기록하기</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzkMqum-tUIwWskpPoaZzrelSaRRhJL_GqNY8iKm9BPSaq_MhPoSE8P0IvohfEI1-wOmw/exec";

        async function loadData() {
            const list = document.getElementById('list');
            try {
                const res = await fetch(`${API_URL}?action=get`);
                const data = await res.json();
                if (data.length === 0) {
                    list.innerHTML = `<p class="text-center text-gray-400 py-20 text-xl">입력된 내역이 없습니다.</p>`;
                    return;
                }
                list.innerHTML = data.map(row => `
                    <div class="bg-white p-6 rounded-3xl shadow-sm flex justify-between items-center">
                        <div><div class="text-2xl font-bold mb-1">${row[2]}</div><div class="text-sm text-gray-400">${row[1]} | ${new Date(row[0]).toLocaleDateString().slice(2)}</div></div>
                        <div class="text-right"><div class="text-2xl font-black text-indigo-600">${Number(row[3]).toLocaleString()}원</div></div>
                    </div>
                `).join('');
            } catch(e) {
                list.innerHTML = `<p class="text-center text-red-400 py-20 text-lg">데이터 연결에 실패했습니다.<br><span class="text-sm">구글 배포 권한을 확인해 주세요.</span></p>`;
            }
        }

        async function save() {
            const btn = document.getElementById('sBtn');
            btn.innerText = "저장 중..."; btn.disabled = true;
            const payload = {
                date: document.getElementById('inDate').value,
                category: document.getElementById('inCat').value,
                item: document.getElementById('inItem').value,
                amount: document.getElementById('inAmount').value
            };
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            location.reload(); 
        }

        window.onload = async () => {
            document.getElementById('inDate').valueAsDate = new Date();
            try {
                const res = await fetch(`${API_URL}?action=getCat`);
                const cats = await res.json();
                document.getElementById('inCat').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
            } catch(e) {}
            loadData();
        };
    </script>
</body>
</html>
